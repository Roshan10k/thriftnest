server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: let React Router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening headers (defense in depth alongside the API's own Helmet headers).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    # Content-Security-Policy for the SPA document. connect-src/img-src include
    # the API origin because the browser talks to the backend cross-origin
    # (http://localhost:8000). For a real deployment, replace that origin with
    # the production API domain (and drop http:// for https://).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:8000; font-src 'self' https: data:; connect-src 'self' http://localhost:8000; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; form-action 'self'" always;

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
